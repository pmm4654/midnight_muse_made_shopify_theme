<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Post Generator — Midnight Muse Made</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-2: #0f3460;
      --accent: #e94560;
      --accent-soft: #533483;
      --text: #eee;
      --text-muted: #999;
      --border: #333;
      --success: #4ecdc4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .status {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    header .status.ready { color: var(--success); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .panel h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    label:first-child { margin-top: 0; }

    select, input, textarea {
      width: 100%;
      padding: 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }

    textarea { min-height: 80px; resize: vertical; }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .product-picker {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 0.3rem;
    }

    .product-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.7rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .product-item:hover { background: var(--surface-2); }
    .product-item.selected { background: var(--accent-soft); }
    .product-item:last-child { border-bottom: none; }

    .product-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      background: var(--bg);
    }

    .product-item .info {
      flex: 1;
      min-width: 0;
    }

    .product-item .info .title {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-item .info .price {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 1.2rem;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .result-section {
      margin-top: 1.2rem;
    }

    .caption-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.9rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .hashtag {
      background: var(--accent-soft);
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .hashtag:hover { background: var(--accent); }

    .image-suggestions {
      margin-top: 0.8rem;
    }

    .image-suggestion {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.6rem;
      background: var(--bg);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .image-suggestion img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
    }

    .image-suggestion .reason {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .image-prompt-box {
      background: var(--bg);
      border: 1px solid var(--accent-soft);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-top: 0.5rem;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      border-radius: 4px;
      color: var(--text-muted);
    }

    .copy-btn:hover { color: var(--text); border-color: var(--text); }

    .tips {
      background: var(--surface-2);
      border-radius: 6px;
      padding: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.8rem;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 2rem;
      justify-content: center;
      color: var(--text-muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.8rem;
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Instagram Post Generator</h1>
    <span class="status" id="statusText">Checking...</span>
  </header>

  <div class="container">
    <!-- Left: Controls -->
    <div class="panel">
      <h2>Configure Post</h2>

      <label>Product Selection</label>
      <select id="selectionMode">
        <option value="random">Random picks</option>
        <option value="seasonal">Seasonal / trending</option>
        <option value="featured">Best photographed</option>
        <option value="manual">Choose specific products</option>
      </select>

      <div id="productPickerWrap" style="display:none">
        <label>Select Products (click to toggle)</label>
        <div class="product-picker" id="productPicker"></div>
      </div>

      <label>Number of products (for auto-pick)</label>
      <input type="number" id="productCount" value="2" min="1" max="5">

      <label>Post Type</label>
      <select id="postType">
        <option value="product_spotlight">Product Spotlight</option>
        <option value="new_arrival">New Arrival</option>
        <option value="collection_showcase">Collection Showcase</option>
        <option value="behind_the_scenes">Behind the Scenes</option>
        <option value="seasonal_promo">Seasonal / Holiday</option>
        <option value="sale_announcement">Sale / Promo</option>
        <option value="customer_appreciation">Customer Appreciation</option>
      </select>

      <label>Mood / Aesthetic</label>
      <select id="mood">
        <option value="witchy_cozy">Witchy & Cozy</option>
        <option value="dark_glamour">Dark Glamour</option>
        <option value="spooky_cute">Spooky Cute</option>
        <option value="boho_mystical">Boho Mystical</option>
        <option value="bright_playful">Bright & Playful</option>
        <option value="minimal_elegant">Minimal & Elegant</option>
      </select>

      <label>Include AI Image Prompt?</label>
      <select id="includeImagePrompt">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>

      <label>Custom Instructions (optional)</label>
      <textarea id="customInstructions" placeholder="e.g. 'Focus on graduation season', 'Mention our free shipping over $25', 'Make it extra spooky'"></textarea>

      <button id="generateBtn" onclick="generatePost()">Generate Post</button>
      <button class="secondary" onclick="generatePost()" style="margin-left: 0.5rem">Re-roll</button>
    </div>

    <!-- Right: Output -->
    <div class="panel">
      <h2>Generated Post</h2>
      <div id="output">
        <p style="color: var(--text-muted); text-align: center; padding: 3rem 1rem;">
          Configure your options and click Generate to create an Instagram post.
        </p>
      </div>
    </div>
  </div>

  <script>
    let allProducts = [];
    let selectedHandles = new Set();

    // Check health & load products on startup
    async function init() {
      try {
        const [healthRes, productsRes] = await Promise.all([
          fetch('/api/health').then(r => r.json()),
          fetch('/api/posts/products').then(r => r.json()),
        ]);

        const statusEl = document.getElementById('statusText');
        if (healthRes.status === 'ready') {
          statusEl.textContent = `Ready — ${healthRes.catalog.productCount} products`;
          statusEl.className = 'status ready';
        } else {
          statusEl.textContent = `Degraded — AI: ${healthRes.ai.connected ? 'OK' : 'disconnected'}`;
        }

        allProducts = productsRes.products || [];
        renderProductPicker();
      } catch (e) {
        document.getElementById('statusText').textContent = 'Error loading';
      }
    }

    function renderProductPicker() {
      const picker = document.getElementById('productPicker');
      picker.innerHTML = allProducts.map(p => `
        <div class="product-item ${selectedHandles.has(p.handle) ? 'selected' : ''}"
             onclick="toggleProduct('${p.handle}', this)">
          ${p.thumbnail ? `<img src="${p.thumbnail}" alt="">` : '<div style="width:40px;height:40px;background:var(--bg);border-radius:4px"></div>'}
          <div class="info">
            <div class="title">${escapeHtml(p.title)}</div>
            <div class="price">$${p.price} · ${p.imageCount} images</div>
          </div>
        </div>
      `).join('');
    }

    function toggleProduct(handle, el) {
      if (selectedHandles.has(handle)) {
        selectedHandles.delete(handle);
        el.classList.remove('selected');
      } else {
        selectedHandles.add(handle);
        el.classList.add('selected');
      }
    }

    document.getElementById('selectionMode').addEventListener('change', (e) => {
      document.getElementById('productPickerWrap').style.display =
        e.target.value === 'manual' ? '' : 'none';
    });

    async function generatePost() {
      const btn = document.getElementById('generateBtn');
      const output = document.getElementById('output');
      btn.disabled = true;

      output.innerHTML = '<div class="loading"><div class="spinner"></div>Generating your post...</div>';

      const mode = document.getElementById('selectionMode').value;
      const body = {
        postType: document.getElementById('postType').value,
        mood: document.getElementById('mood').value,
        includeImagePrompt: document.getElementById('includeImagePrompt').value === 'true',
        customInstructions: document.getElementById('customInstructions').value,
      };

      if (mode === 'manual') {
        body.productHandles = Array.from(selectedHandles);
      } else {
        body.strategy = mode;
        body.count = parseInt(document.getElementById('productCount').value) || 2;
      }

      try {
        const res = await fetch('/api/posts/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Generation failed');

        renderResult(data);
      } catch (e) {
        output.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    function renderResult(data) {
      const output = document.getElementById('output');
      const post = data.post;

      if (!post) {
        output.innerHTML = `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Raw Response</h3>
            <div class="caption-box">${escapeHtml(data.raw)}</div>
          </div>`;
        return;
      }

      let html = '';

      // Caption
      if (post.caption) {
        const captionText = post.caption.replace(/\\n/g, '\n');
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Caption</h3>
            <div class="caption-box">${escapeHtml(captionText)}</div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(captionText)}')">Copy Caption</button>
          </div>`;
      }

      // Hashtags
      if (post.hashtags && post.hashtags.length) {
        const hashtagStr = post.hashtags.map(h => '#' + h).join(' ');
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Hashtags (${post.hashtags.length})</h3>
            <div class="hashtags">
              ${post.hashtags.map(h => `<span class="hashtag">#${escapeHtml(h)}</span>`).join('')}
            </div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(hashtagStr)}')">Copy All Hashtags</button>
          </div>`;
      }

      // Image suggestions
      if (post.suggestedImages && post.suggestedImages.length) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Suggested Images</h3>
            <div class="image-suggestions">
              ${post.suggestedImages.map(img => {
                const product = data.products.find(p => p.title === img.productTitle);
                const imgSrc = product?.images?.[img.imageIndex - 1]?.src || '';
                return `
                  <div class="image-suggestion">
                    ${imgSrc ? `<img src="${imgSrc}" alt="">` : ''}
                    <div>
                      <strong>${escapeHtml(img.productTitle)}</strong>
                      <div class="reason">${escapeHtml(img.reason)}</div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      }

      // Image generation prompt
      if (post.imageGenerationPrompt) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">AI Image Generation Prompt</h3>
            <div class="image-prompt-box">${escapeHtml(post.imageGenerationPrompt)}</div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(post.imageGenerationPrompt)}')">Copy Prompt</button>
          </div>`;
      }

      // Alt text
      if (post.altText) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Alt Text</h3>
            <div class="tips">${escapeHtml(post.altText)}</div>
          </div>`;
      }

      // Posting tips
      if (post.postingTips) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Posting Tips</h3>
            <div class="tips">${escapeHtml(post.postingTips)}</div>
          </div>`;
      }

      output.innerHTML = html;
    }

    function copyText(btn, encoded) {
      const text = decodeURIComponent(encoded);
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
