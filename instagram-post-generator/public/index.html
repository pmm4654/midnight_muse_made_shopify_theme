<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Post Generator — Midnight Muse Made</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-2: #0f3460;
      --accent: #e94560;
      --accent-soft: #533483;
      --text: #eee;
      --text-muted: #999;
      --border: #333;
      --success: #4ecdc4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .status {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    header .status.ready { color: var(--success); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .panel h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    label:first-child { margin-top: 0; }

    select, input, textarea {
      width: 100%;
      padding: 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }

    textarea { min-height: 80px; resize: vertical; }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .product-picker {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 0 0 6px 6px;
      border-top: none;
    }

    .product-search-wrap {
      margin-top: 0.3rem;
    }

    .product-search-wrap input {
      border-radius: 6px 6px 0 0;
      border-bottom: none;
      margin-bottom: 0;
    }

    .selected-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    .selected-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent-soft);
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      cursor: default;
    }

    .selected-chip .remove-chip {
      cursor: pointer;
      opacity: 0.7;
      font-size: 0.9rem;
      line-height: 1;
    }

    .selected-chip .remove-chip:hover { opacity: 1; }

    .product-count-badge {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      margin-left: 0.3rem;
    }

    .no-results {
      padding: 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .product-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.7rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .product-item:hover { background: var(--surface-2); }
    .product-item.selected { background: var(--accent-soft); }
    .product-item:last-child { border-bottom: none; }

    .product-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      background: var(--bg);
    }

    .product-item .info {
      flex: 1;
      min-width: 0;
    }

    .product-item .info .title {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-item .info .price {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 1.2rem;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .result-section {
      margin-top: 1.2rem;
    }

    .caption-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.9rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .hashtag {
      background: var(--accent-soft);
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .hashtag:hover { background: var(--accent); }

    .image-suggestions {
      margin-top: 0.8rem;
    }

    .image-suggestion {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.6rem;
      background: var(--bg);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .image-suggestion img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
    }

    .image-suggestion .reason {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .image-prompt-box {
      background: var(--bg);
      border: 1px solid var(--accent-soft);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-top: 0.5rem;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      border-radius: 4px;
      color: var(--text-muted);
    }

    .copy-btn:hover { color: var(--text); border-color: var(--text); }

    .tips {
      background: var(--surface-2);
      border-radius: 6px;
      padding: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.8rem;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 2rem;
      justify-content: center;
      color: var(--text-muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.8rem;
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .publish-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .publish-section h3 {
      margin-bottom: 1rem;
    }

    .publish-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: flex-end;
    }

    .publish-controls .field {
      flex: 1;
      min-width: 200px;
    }

    .publish-controls label {
      margin-top: 0;
    }

    .session-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 12px;
      margin-bottom: 0.8rem;
    }

    .session-status.valid {
      background: rgba(78, 205, 196, 0.15);
      color: var(--success);
    }

    .session-status.invalid {
      background: rgba(233, 69, 96, 0.15);
      color: var(--accent);
    }

    .preview-image {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 0.8rem;
      border: 1px solid var(--border);
    }

    .publish-result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .publish-result.success {
      background: rgba(78, 205, 196, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .publish-result.error {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    button.publish-btn {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      font-weight: 600;
    }

    button.confirm-btn {
      background: var(--success);
      color: var(--bg);
      font-weight: 600;
    }

    .schedule-input {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Instagram Post Generator</h1>
    <span class="status" id="statusText">Checking...</span>
    <span class="session-status invalid" id="sessionStatus" title="Meta Business Suite session">Meta: checking...</span>
  </header>

  <div class="container">
    <!-- Left: Controls -->
    <div class="panel">
      <h2>Configure Post</h2>

      <label>Data Source</label>
      <select id="dataSource" onchange="onSourceChange()">
        <option value="csv">Local CSV Export (fast, offline)</option>
        <option value="website">Live Website (scrape midnightmusemade.com)</option>
        <option value="shopify">Shopify Admin API (requires token)</option>
      </select>
      <div id="sourceNote" class="tips" style="margin-top:0.4rem;padding:0.5rem;font-size:0.8rem;display:none"></div>

      <label>Product Selection</label>
      <select id="selectionMode">
        <option value="random">Random picks</option>
        <option value="seasonal">Seasonal / trending</option>
        <option value="featured">Best photographed</option>
        <option value="manual">Choose specific products</option>
      </select>

      <div id="productPickerWrap" style="display:none">
        <label>Select Products <span id="selectedBadge" class="product-count-badge" style="display:none">0 selected</span></label>
        <div id="selectedChips" class="selected-chips"></div>
        <div class="product-search-wrap">
          <input type="text" id="productSearch" placeholder="Search products by name..." oninput="filterProducts()">
          <div class="product-picker" id="productPicker"></div>
        </div>
      </div>

      <label>Number of products (for auto-pick)</label>
      <input type="number" id="productCount" value="2" min="1" max="5">

      <label>Post Type</label>
      <select id="postType">
        <option value="product_spotlight">Product Spotlight</option>
        <option value="new_arrival">New Arrival</option>
        <option value="collection_showcase">Collection Showcase</option>
        <option value="behind_the_scenes">Behind the Scenes</option>
        <option value="seasonal_promo">Seasonal / Holiday</option>
        <option value="sale_announcement">Sale / Promo</option>
        <option value="customer_appreciation">Customer Appreciation</option>
      </select>

      <label>Mood / Aesthetic</label>
      <select id="mood">
        <option value="witchy_cozy">Witchy & Cozy</option>
        <option value="dark_glamour">Dark Glamour</option>
        <option value="spooky_cute">Spooky Cute</option>
        <option value="boho_mystical">Boho Mystical</option>
        <option value="bright_playful">Bright & Playful</option>
        <option value="minimal_elegant">Minimal & Elegant</option>
      </select>

      <label>Include AI Image Prompt?</label>
      <select id="includeImagePrompt">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>

      <label>Custom Instructions (optional)</label>
      <textarea id="customInstructions" placeholder="e.g. 'Focus on graduation season', 'Mention our free shipping over $25', 'Make it extra spooky'"></textarea>

      <button id="generateBtn" onclick="generatePost()">Generate Post</button>
      <button class="secondary" onclick="generatePost()" style="margin-left: 0.5rem">Re-roll</button>
    </div>

    <!-- Right: Output -->
    <div class="panel">
      <h2>Generated Post</h2>
      <div id="output">
        <p style="color: var(--text-muted); text-align: center; padding: 3rem 1rem;">
          Configure your options and click Generate to create an Instagram post.
        </p>
      </div>
    </div>
  </div>

  <script>
    let allProducts = [];
    let selectedHandles = new Set();
    let currentSource = 'csv';

    // Check health & load products on startup
    async function init() {
      try {
        const [healthRes, productsRes] = await Promise.all([
          fetch('/api/health').then(r => r.json()),
          fetch('/api/posts/products?source=csv').then(r => r.json()),
        ]);

        const statusEl = document.getElementById('statusText');
        if (healthRes.status === 'ready') {
          statusEl.textContent = `Ready — ${healthRes.catalog.productCount} products`;
          statusEl.className = 'status ready';
        } else {
          statusEl.textContent = `Degraded — AI: ${healthRes.ai.connected ? 'OK' : 'disconnected'}`;
        }

        // Show Shopify API availability
        if (healthRes.sources?.shopify?.configured) {
          document.querySelector('#dataSource option[value="shopify"]').textContent =
            'Shopify Admin API (connected)';
        }

        allProducts = productsRes.products || [];
        renderProductPicker();
      } catch (e) {
        document.getElementById('statusText').textContent = 'Error loading';
      }
    }

    async function onSourceChange() {
      const source = document.getElementById('dataSource').value;
      const noteEl = document.getElementById('sourceNote');
      currentSource = source;

      const notes = {
        csv: '',
        website: 'Fetches products live from midnightmusemade.com public storefront. May be slower than CSV.',
        shopify: 'Uses Shopify Admin API. Requires SHOPIFY_ACCESS_TOKEN and SHOPIFY_STORE_DOMAIN in .env file.',
      };

      if (notes[source]) {
        noteEl.textContent = notes[source];
        noteEl.style.display = '';
      } else {
        noteEl.style.display = 'none';
      }

      // Reload product list from new source
      const picker = document.getElementById('productPicker');
      picker.innerHTML = '<div class="loading"><div class="spinner"></div>Loading products...</div>';

      try {
        const res = await fetch(`/api/posts/products?source=${source}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        allProducts = data.products || [];
        selectedHandles.clear();
        const searchInput = document.getElementById('productSearch');
        if (searchInput) searchInput.value = '';
        renderProductPicker();

        const statusEl = document.getElementById('statusText');
        statusEl.textContent = `${source.toUpperCase()} — ${allProducts.length} products`;
        statusEl.className = 'status ready';
      } catch (e) {
        picker.innerHTML = `<div class="error" style="margin:0.5rem">${escapeHtml(e.message)}</div>`;
        document.getElementById('statusText').textContent = `${source}: error`;
        document.getElementById('statusText').className = 'status';
      }
    }

    function renderProductPicker() {
      const picker = document.getElementById('productPicker');
      const query = (document.getElementById('productSearch')?.value || '').toLowerCase().trim();
      const filtered = query
        ? allProducts.filter(p => p.title.toLowerCase().includes(query) || (p.tags || []).join(' ').toLowerCase().includes(query))
        : allProducts;

      if (filtered.length === 0 && query) {
        picker.innerHTML = `<div class="no-results">No products matching "${escapeHtml(query)}"</div>`;
      } else {
        picker.innerHTML = filtered.map(p => `
          <div class="product-item ${selectedHandles.has(p.handle) ? 'selected' : ''}"
               onclick="toggleProduct('${p.handle}')">
            ${p.thumbnail ? `<img src="${p.thumbnail}" alt="">` : '<div style="width:40px;height:40px;background:var(--bg);border-radius:4px"></div>'}
            <div class="info">
              <div class="title">${escapeHtml(p.title)}</div>
              <div class="price">$${p.price} · ${p.imageCount} images</div>
            </div>
          </div>
        `).join('');
      }

      updateSelectedUI();
    }

    function filterProducts() {
      renderProductPicker();
    }

    function toggleProduct(handle) {
      if (selectedHandles.has(handle)) {
        selectedHandles.delete(handle);
      } else {
        selectedHandles.add(handle);
      }
      renderProductPicker();
    }

    function removeProduct(handle) {
      selectedHandles.delete(handle);
      renderProductPicker();
    }

    function updateSelectedUI() {
      const badge = document.getElementById('selectedBadge');
      const chipsEl = document.getElementById('selectedChips');
      const count = selectedHandles.size;

      if (count > 0) {
        badge.textContent = `${count} selected`;
        badge.style.display = '';
        chipsEl.innerHTML = Array.from(selectedHandles).map(handle => {
          const product = allProducts.find(p => p.handle === handle);
          const title = product ? product.title : handle;
          return `<span class="selected-chip">
            ${escapeHtml(title)}
            <span class="remove-chip" onclick="removeProduct('${handle}')">&times;</span>
          </span>`;
        }).join('');
      } else {
        badge.style.display = 'none';
        chipsEl.innerHTML = '';
      }
    }

    document.getElementById('selectionMode').addEventListener('change', (e) => {
      document.getElementById('productPickerWrap').style.display =
        e.target.value === 'manual' ? '' : 'none';
    });

    async function generatePost() {
      const btn = document.getElementById('generateBtn');
      const output = document.getElementById('output');
      btn.disabled = true;

      output.innerHTML = '<div class="loading"><div class="spinner"></div>Generating your post...</div>';

      const mode = document.getElementById('selectionMode').value;
      const body = {
        postType: document.getElementById('postType').value,
        mood: document.getElementById('mood').value,
        includeImagePrompt: document.getElementById('includeImagePrompt').value === 'true',
        customInstructions: document.getElementById('customInstructions').value,
      };

      body.source = currentSource;

      if (mode === 'manual') {
        body.productHandles = Array.from(selectedHandles);
      } else {
        body.strategy = mode;
        body.count = parseInt(document.getElementById('productCount').value) || 2;
      }

      try {
        const res = await fetch('/api/posts/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Generation failed');

        renderResult(data);
      } catch (e) {
        output.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    function renderResult(data) {
      const output = document.getElementById('output');
      const post = data.post;

      if (!post) {
        output.innerHTML = `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Raw Response</h3>
            <div class="caption-box">${escapeHtml(data.raw)}</div>
          </div>`;
        return;
      }

      let html = '';

      // Caption
      if (post.caption) {
        const captionText = post.caption.replace(/\\n/g, '\n');
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Caption</h3>
            <div class="caption-box">${escapeHtml(captionText)}</div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(captionText)}')">Copy Caption</button>
          </div>`;
      }

      // Hashtags
      if (post.hashtags && post.hashtags.length) {
        const hashtagStr = post.hashtags.map(h => '#' + h).join(' ');
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Hashtags (${post.hashtags.length})</h3>
            <div class="hashtags">
              ${post.hashtags.map(h => `<span class="hashtag">#${escapeHtml(h)}</span>`).join('')}
            </div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(hashtagStr)}')">Copy All Hashtags</button>
          </div>`;
      }

      // Image suggestions
      if (post.suggestedImages && post.suggestedImages.length) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Suggested Images</h3>
            <div class="image-suggestions">
              ${post.suggestedImages.map(img => {
                const product = data.products.find(p => p.title === img.productTitle);
                const imgSrc = product?.images?.[img.imageIndex - 1]?.src || '';
                return `
                  <div class="image-suggestion">
                    ${imgSrc ? `<img src="${imgSrc}" alt="">` : ''}
                    <div>
                      <strong>${escapeHtml(img.productTitle)}</strong>
                      <div class="reason">${escapeHtml(img.reason)}</div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      }

      // Image generation prompt
      if (post.imageGenerationPrompt) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">AI Image Generation Prompt</h3>
            <div class="image-prompt-box">${escapeHtml(post.imageGenerationPrompt)}</div>
            <button class="copy-btn" onclick="copyText(this, '${encodeURIComponent(post.imageGenerationPrompt)}')">Copy Prompt</button>
          </div>`;
      }

      // Alt text
      if (post.altText) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Alt Text</h3>
            <div class="tips">${escapeHtml(post.altText)}</div>
          </div>`;
      }

      // Posting tips
      if (post.postingTips) {
        html += `
          <div class="result-section">
            <h3 style="margin-bottom:0.5rem">Posting Tips</h3>
            <div class="tips">${escapeHtml(post.postingTips)}</div>
          </div>`;
      }

      // Publish to Instagram section
      html += `
        <div class="publish-section">
          <h3>Publish to Instagram</h3>
          <div id="publishSessionStatus"></div>
          <div class="publish-controls">
            <div class="field">
              <label>Image for Post</label>
              <select id="publishImageSelect" onchange="toggleCustomImageUrl(this)">
                ${(post.suggestedImages || []).map((img, i) => {
                  const product = data.products.find(p => p.title === img.productTitle);
                  const imgSrc = product?.images?.[img.imageIndex - 1]?.src || '';
                  return `<option value="${imgSrc}">${escapeHtml(img.productTitle)} (image #${img.imageIndex})</option>`;
                }).join('')}
                <option value="custom">Custom image URL...</option>
              </select>
              <input type="text" id="customImageUrl" placeholder="Paste image URL..." style="display:none;margin-top:0.3rem">
            </div>
            <div class="field">
              <label>Schedule (optional)</label>
              <input type="datetime-local" id="scheduleTime">
            </div>
          </div>
          <div style="margin-top:0.8rem;display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="publish-btn" onclick="previewPublish()">Preview in Meta Business Suite</button>
            <button class="secondary" onclick="directPublish()">Publish Now</button>
          </div>
          <div id="publishResult"></div>
        </div>`;

      // Store current post data for publishing
      window._currentPost = { post, data };

      output.innerHTML = html;
    }

    function copyText(btn, encoded) {
      const text = decodeURIComponent(encoded);
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Publishing Functions ────────────────────────

    async function checkPublishSession() {
      try {
        const res = await fetch('/api/posts/session');
        const session = await res.json();
        const el = document.getElementById('sessionStatus');
        if (session.valid) {
          el.textContent = 'Meta: connected';
          el.className = 'session-status valid';
        } else {
          el.textContent = 'Meta: not logged in';
          el.className = 'session-status invalid';
          el.style.cursor = 'pointer';
          el.title = 'Click to login to Meta Business Suite';
          el.onclick = initMetaSession;
        }
      } catch {
        const el = document.getElementById('sessionStatus');
        el.textContent = 'Meta: unavailable';
        el.className = 'session-status invalid';
      }
    }

    async function initMetaSession() {
      const el = document.getElementById('sessionStatus');
      el.textContent = 'Meta: opening browser...';
      el.className = 'session-status invalid';

      try {
        const res = await fetch('/api/posts/session/init', { method: 'POST' });
        const result = await res.json();
        if (result.success) {
          el.textContent = 'Meta: connected';
          el.className = 'session-status valid';
          el.onclick = null;
          el.style.cursor = '';
        } else {
          el.textContent = 'Meta: login failed';
        }
      } catch (e) {
        el.textContent = 'Meta: error';
      }
    }

    function toggleCustomImageUrl(el) {
      const custom = document.getElementById('customImageUrl');
      if (custom) custom.style.display = el.value === 'custom' ? '' : 'none';
    }

    function getPublishParams() {
      if (!window._currentPost) return null;
      const { post } = window._currentPost;

      const imageSelect = document.getElementById('publishImageSelect');
      let imageUrl = imageSelect?.value;
      if (imageUrl === 'custom') {
        imageUrl = document.getElementById('customImageUrl')?.value;
      }

      const scheduleEl = document.getElementById('scheduleTime');
      const scheduleTime = scheduleEl?.value ? new Date(scheduleEl.value).toISOString() : null;

      return {
        caption: post.caption?.replace(/\\n/g, '\n') || '',
        hashtags: post.hashtags || [],
        imageUrl: imageUrl || '',
        scheduleTime,
      };
    }

    async function previewPublish() {
      const params = getPublishParams();
      if (!params) return;
      if (!params.imageUrl) {
        alert('Please select an image for the post.');
        return;
      }

      const resultEl = document.getElementById('publishResult');
      resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Opening Meta Business Suite for preview...</div>';

      try {
        const res = await fetch('/api/posts/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...params, confirm: false }),
        });

        const result = await res.json();

        if (result.success && result.needsConfirmation) {
          resultEl.innerHTML = `
            <div class="publish-result success">
              Preview ready! Review the screenshot below.
              ${result.screenshotUrl ? `<img class="preview-image" src="${result.screenshotUrl}" alt="Post preview">` : ''}
              <div style="margin-top:1rem">
                <button class="confirm-btn" onclick="confirmPublish()">Confirm &amp; Publish</button>
                <button class="secondary" onclick="document.getElementById('publishResult').innerHTML=''">Cancel</button>
              </div>
            </div>`;
        } else if (result.needsLogin) {
          resultEl.innerHTML = `
            <div class="publish-result error">
              Not logged in to Meta Business Suite.
              <button class="secondary" onclick="initMetaSession()" style="margin-left:0.5rem">Login Now</button>
            </div>`;
        } else {
          resultEl.innerHTML = `<div class="publish-result error">${escapeHtml(result.error || 'Preview failed')}</div>`;
        }
      } catch (e) {
        resultEl.innerHTML = `<div class="publish-result error">${escapeHtml(e.message)}</div>`;
      }
    }

    async function directPublish() {
      if (!confirm('Publish this post to Instagram immediately?')) return;
      await doPublish(true);
    }

    async function confirmPublish() {
      await doPublish(true);
    }

    async function doPublish(confirmed) {
      const params = getPublishParams();
      if (!params) return;
      if (!params.imageUrl) {
        alert('Please select an image for the post.');
        return;
      }

      const resultEl = document.getElementById('publishResult');
      resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Publishing to Instagram...</div>';

      try {
        const res = await fetch('/api/posts/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...params, confirm: confirmed }),
        });

        const result = await res.json();

        if (result.success) {
          resultEl.innerHTML = `
            <div class="publish-result success">
              ${escapeHtml(result.message)}
              ${result.screenshotUrl ? `<img class="preview-image" src="${result.screenshotUrl}" alt="Published post">` : ''}
            </div>`;
          checkPublishSession(); // Refresh session status
        } else if (result.needsLogin) {
          resultEl.innerHTML = `
            <div class="publish-result error">
              Session expired.
              <button class="secondary" onclick="initMetaSession()" style="margin-left:0.5rem">Re-login</button>
            </div>`;
        } else {
          resultEl.innerHTML = `
            <div class="publish-result error">
              ${escapeHtml(result.error || 'Publishing failed')}
              ${result.screenshotUrl ? `<img class="preview-image" src="${result.screenshotUrl}" alt="Error screenshot">` : ''}
            </div>`;
        }
      } catch (e) {
        resultEl.innerHTML = `<div class="publish-result error">${escapeHtml(e.message)}</div>`;
      }
    }

    init();
    checkPublishSession();
  </script>
</body>
</html>
